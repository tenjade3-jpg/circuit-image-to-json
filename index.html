<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>電路圖辨識多版型 v7</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, "Microsoft JhengHei", sans-serif; background: #f3f4f6; color: #111827; }
    .container { max-width: 1600px; margin: 0 auto; padding: 20px; }
    h1 { margin: 0 0 8px; font-size: 28px; }
    .desc { margin: 0 0 16px; color: #4b5563; line-height: 1.6; }
    .status { padding: 10px 14px; border-radius: 10px; background: #e0f2fe; color: #075985; margin-bottom: 16px; font-size: 14px; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; align-items: center; }
    .toolbar input[type="file"] { background: white; padding: 10px; border-radius: 10px; border: 1px solid #d1d5db; }
    button { border: none; border-radius: 10px; padding: 10px 16px; cursor: pointer; font-weight: 700; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-success { background: #16a34a; color: white; }
    .layout { display: grid; grid-template-columns: 1.35fr 1fr; gap: 20px; }
    .card { background: white; border-radius: 16px; padding: 16px; box-shadow: 0 6px 20px rgba(0,0,0,0.08); }
    .canvas-wrap { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .panel-title { margin: 0 0 10px; font-size: 16px; }
    canvas { width: 100%; background: #fff; border: 1px solid #d1d5db; border-radius: 12px; }
    textarea { width: 100%; min-height: 640px; resize: vertical; border: 1px solid #d1d5db; border-radius: 12px; padding: 12px; font-family: Consolas, monospace; font-size: 13px; line-height: 1.5; }
    .small { font-size: 13px; color: #6b7280; line-height: 1.6; margin-top: 10px; }
    @media (max-width: 1100px) {
      .layout { grid-template-columns: 1fr; }
      .canvas-wrap { grid-template-columns: 1fr; }
      textarea { min-height: 360px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>電路圖辨識多版型 v7</h1>
    <p class="desc">自動判斷常見固定版型，並輸出穩定 JSON。支援：單回路 RL、串並聯 RLC、雙支路並聯 RC。</p>
    <div id="status" class="status">OpenCV.js 載入中…</div>

    <div class="toolbar">
      <input type="file" id="imageInput" accept="image/*" />
      <button class="btn-primary" id="processBtn" disabled>開始辨識</button>
      <button class="btn-success" id="downloadBtn">下載 JSON</button>
    </div>

    <div class="layout">
      <div class="card">
        <div class="canvas-wrap">
          <div>
            <h3 class="panel-title">原始圖片</h3>
            <canvas id="srcCanvas" width="820" height="560"></canvas>
          </div>
          <div>
            <h3 class="panel-title">處理結果 / 標記</h3>
            <canvas id="dstCanvas" width="820" height="560"></canvas>
          </div>
          <div>
            <h3 class="panel-title">JSON 預覽圖</h3>
            <canvas id="previewCanvas" width="820" height="560"></canvas>
          </div>
        </div>
        <div class="small">內建版型判斷：<br>① 單回路：V + R + L<br>② 上方主幹 + 中間支路 + 右支路：V + R + L + C + R<br>③ 上方主幹 + 中間支路電阻 + 右支路電阻電容：V + R + R + C + GND</div>
      </div>
      <div class="card">
        <h3 class="panel-title">輸出 JSON</h3>
        <textarea id="output"></textarea>
      </div>
    </div>
  </div>

  <script>
    window.Module = {
      onRuntimeInitialized() {
        window.cvReady = true;
        setStatus('OpenCV.js 已載入，可以開始辨識');
        document.getElementById('processBtn').disabled = false;
      }
    };
  </script>
  <script async src="https://docs.opencv.org/4.x/opencv.js"></script>

  <script>
    const GRID = 20;
    const FREQ_HZ = 60;
    const statusEl = document.getElementById('status');
    const imageInput = document.getElementById('imageInput');
    const processBtn = document.getElementById('processBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const outputEl = document.getElementById('output');
    const srcCanvas = document.getElementById('srcCanvas');
    const dstCanvas = document.getElementById('dstCanvas');
    const previewCanvas = document.getElementById('previewCanvas');
    const srcCtx = srcCanvas.getContext('2d');
    const dstCtx = dstCanvas.getContext('2d');
    const previewCtx = previewCanvas.getContext('2d');

    let loadedImage = null;
    let lastResult = null;

    function setStatus(text) { statusEl.textContent = text; }
    function snap(v) { return Math.round(v / GRID) * GRID; }
    function uid(prefix) { return prefix + '_' + Math.random().toString(36).slice(2, 10); }

    function clearCanvas(ctx, canvas) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function fitAndDrawImage(img, ctx, canvas) {
      clearCanvas(ctx, canvas);
      const scale = Math.min(canvas.width / img.width, canvas.height / img.height);
      const w = img.width * scale;
      const h = img.height * scale;
      const x = (canvas.width - w) / 2;
      const y = (canvas.height - h) / 2;
      ctx.drawImage(img, x, y, w, h);
    }

    function loadImageToCanvas(file) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          loadedImage = img;
          fitAndDrawImage(img, srcCtx, srcCanvas);
          fitAndDrawImage(img, dstCtx, dstCanvas);
          resolve(img);
        };
        img.onerror = reject;
        img.src = URL.createObjectURL(file);
      });
    }

    imageInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      try {
        await loadImageToCanvas(file);
        setStatus('圖片已載入，請按「開始辨識」');
      } catch (err) {
        console.error(err);
        setStatus('圖片載入失敗');
      }
    });

    processBtn.addEventListener('click', async () => {
      if (!window.cvReady) return alert('OpenCV.js 尚未載入完成');
      if (!loadedImage) return alert('請先上傳圖片');
      try {
        setStatus('辨識中…');
        const result = processCircuitImage();
        lastResult = result;
        outputEl.value = JSON.stringify(result, null, 2);
        drawJsonPreview(result);
        await copyJsonToClipboard(result);
        setStatus('辨識完成，JSON 已自動複製');
      } catch (err) {
        console.error(err);
        setStatus('辨識失敗：' + err.message);
      }
    });

    downloadBtn.addEventListener('click', () => {
      if (!lastResult) return alert('目前沒有結果');
      exportJsonFile(lastResult, 'circuit.json');
    });

    function processCircuitImage() {
      const src = cv.imread(srcCanvas);
      const gray = new cv.Mat();
      const binary = new cv.Mat();
      const clean = new cv.Mat();
      cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
      cv.GaussianBlur(gray, gray, new cv.Size(5, 5), 0, 0, cv.BORDER_DEFAULT);
      cv.threshold(gray, binary, 0, 255, cv.THRESH_BINARY_INV + cv.THRESH_OTSU);
      removeTextLikeContours(binary, clean);
      cv.cvtColor(clean, src, cv.COLOR_GRAY2RGBA);
      cv.imshow(dstCanvas, src);

      const metrics = extractMetrics(clean);
      const mode = decideTopology(metrics);
      const result = buildJsonByMode(mode, metrics);
      drawDetectionOverlay(result);

      src.delete(); gray.delete(); binary.delete(); clean.delete();
      return result;
    }

    function removeTextLikeContours(srcBinary, outBinary) {
      srcBinary.copyTo(outBinary);
      const contours = new cv.MatVector();
      const hierarchy = new cv.Mat();
      cv.findContours(srcBinary, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
      for (let i = 0; i < contours.size(); i++) {
        const cnt = contours.get(i);
        const rect = cv.boundingRect(cnt);
        const area = cv.contourArea(cnt);
        const w = rect.width, h = rect.height;
        const aspect = w / Math.max(h, 1);
        const fill = area / Math.max(w * h, 1);
        const textLike = (
          (w >= 8 && w <= 90 && h >= 6 && h <= 22 && aspect >= 1.7) ||
          (w >= 6 && w <= 18 && h >= 6 && h <= 24 && fill > 0.08 && fill < 0.72) ||
          (w <= 14 && h <= 14)
        );
        if (textLike) {
          const p = 2;
          const x = Math.max(0, rect.x - p), y = Math.max(0, rect.y - p);
          const ww = Math.min(outBinary.cols - x, rect.width + p * 2);
          const hh = Math.min(outBinary.rows - y, rect.height + p * 2);
          const roi = outBinary.roi(new cv.Rect(x, y, ww, hh));
          roi.setTo(new cv.Scalar(0));
          roi.delete();
        }
        cnt.delete();
      }
      contours.delete();
      hierarchy.delete();
    }

    function extractMetrics(binaryMat) {
      const contours = new cv.MatVector();
      const hierarchy = new cv.Mat();
      const circles = [];
      const horiz = [];
      const vert = [];
      const grounds = [];

      cv.findContours(binaryMat, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
      for (let i = 0; i < contours.size(); i++) {
        const cnt = contours.get(i);
        const rect = cv.boundingRect(cnt);
        const area = cv.contourArea(cnt);
        const w = rect.width, h = rect.height;
        const cx = snap(rect.x + w / 2);
        const cy = snap(rect.y + h / 2);
        const aspect = w / Math.max(h, 1);
        const fill = area / Math.max(w * h, 1);

        if (w >= 24 && h >= 24 && aspect > 0.75 && aspect < 1.25 && fill > 0.25 && fill < 0.92) {
          circles.push({ x: cx, y: cy });
        } else if (w >= 22 && w <= 90 && h >= 8 && h <= 32) {
          horiz.push({ x: cx, y: cy, w, h, fill });
        } else if (h >= 30 && h <= 150 && w >= 10 && w <= 40) {
          vert.push({ x: cx, y: cy, w, h, fill });
        } else if (w >= 16 && w <= 60 && h >= 10 && h <= 26 && cy > srcCanvas.height * 0.55) {
          grounds.push({ x: cx, y: cy });
        }
        cnt.delete();
      }
      contours.delete();
      hierarchy.delete();

      circles.sort((a, b) => a.x - b.x);
      horiz.sort((a, b) => a.x - b.x || a.y - b.y);
      vert.sort((a, b) => a.x - b.x || a.y - b.y);

      return {
        circles,
        horiz,
        vert,
        grounds,
        width: srcCanvas.width,
        height: srcCanvas.height
      };
    }

    function decideTopology(m) {
      const source = m.circles[0] || { x: 160, y: 280 };
      const rightVerts = m.vert.filter(v => v.x > source.x + 80);
      const horizNearTop = m.horiz.filter(h => h.y < m.height * 0.45);
      const groundCount = m.grounds.length;

      if (rightVerts.length <= 2 && horizNearTop.length <= 1) {
        return 'single_rl';
      }

      if (groundCount >= 1 && rightVerts.length >= 2 && horizNearTop.length >= 1) {
        return 'parallel_rc';
      }

      return 'series_shunt_rlc';
    }

    function buildJsonByMode(mode, m) {
      if (mode === 'single_rl') return buildSingleRL(m);
      if (mode === 'parallel_rc') return buildParallelRC(m);
      return buildSeriesShuntRLC(m);
    }

    function buildSingleRL(m) {
      const source = m.circles[0] || { x: 180, y: 280 };
      const rightVerts = m.vert.filter(v => v.x > source.x + 80).sort((a,b)=>a.y-b.y);
      const xLeft = snap(source.x);
      const xRight = snap((rightVerts[0]?.x) || 380);
      const vY = snap(source.y);
      const rY = snap((rightVerts[0]?.y) || 200);
      const lY = snap((rightVerts[1]?.y) || 380);

      const V1 = { id: uid('v'), type: 'V', name: 'V1', x: xLeft, y: vY, a: { x: xLeft, y: snap(vY - 80) }, b: { x: xLeft, y: snap(vY + 80) }, rotation: 90, value: '' };
      const R1 = { id: uid('r'), type: 'R', name: 'R1', x: xRight, y: rY, a: { x: xRight, y: snap(rY - 80) }, b: { x: xRight, y: snap(rY + 80) }, rotation: 90, value: '' };
      const L1 = { id: uid('l'), type: 'L', name: 'L1', x: xRight, y: lY, a: { x: xRight, y: snap(lY - 80) }, b: { x: xRight, y: snap(lY + 80) }, rotation: 90, value: '' };
      const GND = { id: uid('g'), type: 'GND', name: 'GND', x: xRight, y: snap(L1.b.y + 20), p: { x: xRight, y: L1.b.y } };

      return {
        version: 2,
        grid: GRID,
        junctions: [],
        wires: [
          { id: uid('w'), points: [{ x: R1.a.x, y: R1.a.y }, { x: V1.a.x, y: R1.a.y }, { x: V1.a.x, y: V1.a.y }] },
          { id: uid('w'), points: [{ x: R1.b.x, y: R1.b.y }, { x: L1.a.x, y: L1.a.y }] },
          { id: uid('w'), points: [{ x: L1.b.x, y: L1.b.y }, { x: V1.b.x, y: L1.b.y }, { x: V1.b.x, y: V1.b.y }] },
          { id: uid('w'), points: [{ x: L1.b.x, y: L1.b.y }, { x: GND.p.x, y: GND.p.y }] }
        ],
        freqHz: FREQ_HZ,
        elements: [GND, V1, R1, L1]
      };
    }

    function buildSeriesShuntRLC(m) {
      const source = m.circles[0] || { x: 140, y: 300 };
      const rightVerts = m.vert.filter(v => v.x > source.x + 80).sort((a,b)=>a.x-b.x||a.y-b.y);
      const horizTop = m.horiz.filter(h => h.y < m.height * 0.45).sort((a,b)=>a.x-b.x);

      const sourceX = snap(source.x);
      const sourceY = snap(source.y);
      const nodeAY = snap(Math.min(horizTop[0]?.y || 160, horizTop[horizTop.length-1]?.y || 160, (rightVerts[0]?.y || 300) - 120));
      const nodeAX = snap((rightVerts[0]?.x) || 420);
      const rightX = snap(Math.max((rightVerts[1]?.x) || (nodeAX + 220), nodeAX + 220));
      const bottomY = snap(Math.max((rightVerts[0]?.y || 300) + 120, (rightVerts[1]?.y || 300) + 120, sourceY + 80));

      const V1 = { id: uid('v'), type: 'V', name: 'V1', x: sourceX, y: sourceY, a: { x: sourceX, y: snap(sourceY - 80) }, b: { x: sourceX, y: snap(sourceY + 80) }, rotation: 90, value: '' };
      const R1 = { id: uid('r'), type: 'R', name: 'R1', x: snap((sourceX + nodeAX)/2), y: nodeAY, a: { x: sourceX, y: nodeAY }, b: { x: nodeAX, y: nodeAY }, rotation: 0, value: '' };
      const L1 = { id: uid('l'), type: 'L', name: 'L1', x: nodeAX, y: snap((nodeAY + bottomY)/2), a: { x: nodeAX, y: nodeAY }, b: { x: nodeAX, y: bottomY }, rotation: 90, value: '' };
      const C1 = { id: uid('c'), type: 'C', name: 'C1', x: snap((nodeAX + rightX)/2), y: nodeAY, a: { x: nodeAX, y: nodeAY }, b: { x: rightX, y: nodeAY }, rotation: 0, value: '' };
      const R2 = { id: uid('r'), type: 'R', name: 'R2', x: rightX, y: snap((nodeAY + bottomY)/2), a: { x: rightX, y: bottomY }, b: { x: rightX, y: nodeAY }, rotation: 90, value: '' };
      const GND = { id: uid('g'), type: 'GND', name: 'GND', x: nodeAX, y: snap(bottomY + 20), p: { x: nodeAX, y: bottomY } };

      return {
        version: 2,
        grid: GRID,
        junctions: [],
        wires: [
          { id: uid('w'), points: [{ x: V1.a.x, y: V1.a.y }, { x: V1.a.x, y: nodeAY }, { x: R1.a.x, y: R1.a.y }] },
          { id: uid('w'), points: [{ x: R1.b.x, y: R1.b.y }, { x: C1.a.x, y: C1.a.y }] },
          { id: uid('w'), points: [{ x: C1.b.x, y: C1.b.y }, { x: R2.b.x, y: R2.b.y }] },
          { id: uid('w'), points: [{ x: L1.a.x, y: L1.a.y }, { x: nodeAX, y: nodeAY }] },
          { id: uid('w'), points: [{ x: V1.b.x, y: V1.b.y }, { x: V1.b.x, y: bottomY }, { x: L1.b.x, y: L1.b.y }, { x: R2.a.x, y: R2.a.y }] },
          { id: uid('w'), points: [{ x: L1.b.x, y: L1.b.y }, { x: GND.p.x, y: GND.p.y }] }
        ],
        freqHz: FREQ_HZ,
        elements: [V1, R1, L1, C1, R2, GND]
      };
    }

    function buildParallelRC(m) {
      const source = m.circles[0] || { x: 160, y: 260 };
      const rightVerts = m.vert.filter(v => v.x > source.x + 80).sort((a,b)=>a.x-b.x||a.y-b.y);
      const grounds = m.grounds.sort((a,b)=>b.y-a.y);

      const leftX = snap(source.x);
      const topY = snap((source.y || 260) - 80);
      const bottomY = snap(Math.max((grounds[0]?.y || 420), (source.y || 260) + 100));
      const midX = snap((rightVerts[0]?.x) || 360);
      const rightX = snap(Math.max((rightVerts[1]?.x) || 560, midX + 180));
      const sourceY = snap((topY + bottomY)/2);

      const V1 = { id: uid('v'), type: 'V', name: 'V1', x: leftX, y: sourceY, a: { x: leftX, y: topY }, b: { x: leftX, y: bottomY }, rotation: 90, value: '' };
      const R1 = { id: uid('r'), type: 'R', name: 'R1', x: midX, y: snap((topY + bottomY)/2), a: { x: midX, y: topY }, b: { x: midX, y: bottomY }, rotation: 90, value: '' };
      const R2 = { id: uid('r'), type: 'R', name: 'R2', x: rightX, y: snap((topY + bottomY)/2 - 80), a: { x: rightX, y: snap((topY + bottomY)/2) }, b: { x: rightX, y: topY }, rotation: 90, value: '' };
      const C1 = { id: uid('c'), type: 'C', name: 'C1', x: rightX, y: snap((topY + bottomY)/2 + 80), a: { x: rightX, y: bottomY }, b: { x: rightX, y: snap((topY + bottomY)/2) }, rotation: 90, value: '' };
      const GND = { id: uid('g'), type: 'GND', name: 'GND', x: midX, y: snap(bottomY + 20), p: { x: midX, y: bottomY } };

      return {
        version: 2,
        grid: GRID,
        junctions: [],
        wires: [
          { id: uid('w'), points: [{ x: leftX, y: topY }, { x: midX, y: topY }, { x: rightX, y: topY }] },
          { id: uid('w'), points: [{ x: leftX, y: bottomY }, { x: midX, y: bottomY }, { x: rightX, y: bottomY }] },
          { id: uid('w'), points: [{ x: midX, y: bottomY }, { x: GND.p.x, y: GND.p.y }] }
        ],
        freqHz: FREQ_HZ,
        elements: [V1, R1, R2, C1, GND]
      };
    }

    async function copyJsonToClipboard(data) {
      const jsonText = JSON.stringify(data, null, 2);
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(jsonText);
          return true;
        }
        const ta = document.createElement('textarea');
        ta.value = jsonText;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        const ok = document.execCommand('copy');
        document.body.removeChild(ta);
        return !!ok;
      } catch {
        return false;
      }
    }

    function exportJsonFile(data, filename = 'circuit.json') {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function drawDetectionOverlay(result) {
      if (loadedImage) fitAndDrawImage(loadedImage, dstCtx, dstCanvas); else clearCanvas(dstCtx, dstCanvas);
      dstCtx.strokeStyle = '#2563eb';
      dstCtx.lineWidth = 2;
      for (const wire of result.wires || []) {
        dstCtx.beginPath();
        dstCtx.moveTo(wire.points[0].x, wire.points[0].y);
        for (let i = 1; i < wire.points.length; i++) dstCtx.lineTo(wire.points[i].x, wire.points[i].y);
        dstCtx.stroke();
      }
      for (const el of result.elements || []) {
        dstCtx.strokeStyle = '#dc2626';
        dstCtx.strokeRect(el.x - 22, el.y - 22, 44, 44);
        dstCtx.fillStyle = '#dc2626';
        dstCtx.font = '14px Arial';
        dstCtx.fillText(el.type + ':' + el.name, el.x + 8, el.y - 8);
      }
    }

    function drawJsonPreview(result) {
      clearCanvas(previewCtx, previewCanvas);
      previewCtx.strokeStyle = '#e5e7eb';
      previewCtx.lineWidth = 1;
      for (let x = 0; x <= previewCanvas.width; x += GRID) { previewCtx.beginPath(); previewCtx.moveTo(x, 0); previewCtx.lineTo(x, previewCanvas.height); previewCtx.stroke(); }
      for (let y = 0; y <= previewCanvas.height; y += GRID) { previewCtx.beginPath(); previewCtx.moveTo(0, y); previewCtx.lineTo(previewCanvas.width, y); previewCtx.stroke(); }
      previewCtx.strokeStyle = '#2563eb';
      previewCtx.lineWidth = 3;
      for (const wire of result.wires || []) {
        previewCtx.beginPath();
        previewCtx.moveTo(wire.points[0].x, wire.points[0].y);
        for (let i = 1; i < wire.points.length; i++) previewCtx.lineTo(wire.points[i].x, wire.points[i].y);
        previewCtx.stroke();
      }
      for (const el of result.elements || []) drawSymbol(previewCtx, el);
    }

    function drawSymbol(ctx, el) {
      ctx.save();
      ctx.translate(el.x, el.y);
      ctx.rotate(((el.rotation || 0) * Math.PI) / 180);
      ctx.strokeStyle = '#111827';
      ctx.fillStyle = '#111827';
      ctx.lineWidth = 3;
      ctx.font = '14px Arial';

      if (el.type === 'R') {
        if ((el.rotation || 0) === 0) {
          ctx.beginPath(); ctx.moveTo(-40, 0); ctx.lineTo(-25, 0);
          let x = -25; const step = 8; const amp = 10;
          for (let i = 0; i < 6; i++) { ctx.lineTo(x + step, i % 2 === 0 ? amp : -amp); x += step; }
          ctx.lineTo(25, 0); ctx.lineTo(40, 0); ctx.stroke();
        } else {
          ctx.beginPath(); ctx.moveTo(0, -40); ctx.lineTo(0, -25);
          let y = -25; const step = 8; const amp = 10;
          for (let i = 0; i < 6; i++) { ctx.lineTo(i % 2 === 0 ? amp : -amp, y + step); y += step; }
          ctx.lineTo(0, 25); ctx.lineTo(0, 40); ctx.stroke();
        }
      } else if (el.type === 'L') {
        ctx.beginPath(); ctx.moveTo(0, -40); ctx.lineTo(0, -22); ctx.stroke();
        for (let i = 0; i < 4; i++) { ctx.beginPath(); ctx.arc(0, -14 + i * 10, 8, Math.PI / 2, -Math.PI / 2, true); ctx.stroke(); }
        ctx.beginPath(); ctx.moveTo(0, 22); ctx.lineTo(0, 40); ctx.stroke();
      } else if (el.type === 'C') {
        if ((el.rotation || 0) === 90) {
          ctx.beginPath();
          ctx.moveTo(0, -40); ctx.lineTo(0, -12);
          ctx.moveTo(-18, -8); ctx.lineTo(18, -8);
          ctx.moveTo(-18, 8); ctx.lineTo(18, 8);
          ctx.moveTo(0, 12); ctx.lineTo(0, 40);
          ctx.stroke();
        } else {
          ctx.beginPath();
          ctx.moveTo(-40, 0); ctx.lineTo(-12, 0);
          ctx.moveTo(-8, -18); ctx.lineTo(-8, 18);
          ctx.moveTo(8, -18); ctx.lineTo(8, 18);
          ctx.moveTo(12, 0); ctx.lineTo(40, 0);
          ctx.stroke();
        }
      } else if (el.type === 'V') {
        ctx.beginPath(); ctx.moveTo(0, -40); ctx.lineTo(0, -20); ctx.moveTo(0, 20); ctx.lineTo(0, 40); ctx.stroke();
        ctx.beginPath(); ctx.arc(0, 0, 20, 0, Math.PI * 2); ctx.stroke();
        ctx.fillText('+', 10, 4); ctx.fillText('-', -16, 4);
      } else if (el.type === 'GND') {
        ctx.beginPath(); ctx.moveTo(0, -20); ctx.lineTo(0, 0); ctx.moveTo(-16, 0); ctx.lineTo(16, 0); ctx.moveTo(-10, 8); ctx.lineTo(10, 8); ctx.moveTo(-5, 16); ctx.lineTo(5, 16); ctx.stroke();
      }
      ctx.rotate(-((el.rotation || 0) * Math.PI) / 180);
      ctx.fillText(el.name || el.type, 14, -14);
      ctx.restore();
    }

    outputEl.value = JSON.stringify({ version: 2, grid: 20, junctions: [], wires: [], freqHz: 60, elements: [] }, null, 2);
    clearCanvas(srcCtx, srcCanvas);
    clearCanvas(dstCtx, dstCanvas);
    clearCanvas(previewCtx, previewCanvas);
  </script>
