<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>電路圖辨識專用版 v5</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, "Microsoft JhengHei", sans-serif; background: #f3f4f6; color: #111827; }
    .container { max-width: 1600px; margin: 0 auto; padding: 20px; }
    h1 { margin: 0 0 8px; font-size: 28px; }
    .desc { margin: 0 0 16px; color: #4b5563; line-height: 1.6; }
    .status { padding: 10px 14px; border-radius: 10px; background: #e0f2fe; color: #075985; margin-bottom: 16px; font-size: 14px; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; align-items: center; }
    .toolbar input[type="file"] { background: white; padding: 10px; border-radius: 10px; border: 1px solid #d1d5db; }
    button { border: none; border-radius: 10px; padding: 10px 16px; cursor: pointer; font-weight: 700; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-success { background: #16a34a; color: white; }
    .btn-gray { background: #374151; color: white; }
    .layout { display: grid; grid-template-columns: 1.35fr 1fr; gap: 20px; }
    .card { background: white; border-radius: 16px; padding: 16px; box-shadow: 0 6px 20px rgba(0,0,0,0.08); }
    .canvas-wrap { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .panel-title { margin: 0 0 10px; font-size: 16px; }
    canvas { width: 100%; background: #fff; border: 1px solid #d1d5db; border-radius: 12px; }
    textarea { width: 100%; min-height: 640px; resize: vertical; border: 1px solid #d1d5db; border-radius: 12px; padding: 12px; font-family: Consolas, monospace; font-size: 13px; line-height: 1.5; }
    .small { font-size: 13px; color: #6b7280; line-height: 1.6; margin-top: 10px; }
    .list { margin: 8px 0 0; padding-left: 18px; color: #374151; font-size: 14px; line-height: 1.7; }
    @media (max-width: 1100px) {
      .layout { grid-template-columns: 1fr; }
      .canvas-wrap { grid-template-columns: 1fr; }
      textarea { min-height: 360px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>電路圖辨識專用版 v5</h1>
    <p class="desc">針對固定版型：左 V、右 R→L→GND。這版不是通用辨識器，而是專門把你這類圖轉成穩定 JSON。</p>
    <div id="status" class="status">OpenCV.js 載入中…</div>

    <div class="toolbar">
      <input type="file" id="imageInput" accept="image/*" />
      <button class="btn-primary" id="processBtn" disabled>開始辨識</button>
      <button class="btn-success" id="downloadBtn">下載 JSON</button>
      <button class="btn-gray" id="demoBtn">載入示範結果</button>
    </div>

    <div class="layout">
      <div class="card">
        <div class="canvas-wrap">
          <div>
            <h3 class="panel-title">原始圖片</h3>
            <canvas id="srcCanvas" width="700" height="500"></canvas>
          </div>
          <div>
            <h3 class="panel-title">處理結果 / 標記</h3>
            <canvas id="dstCanvas" width="700" height="500"></canvas>
          </div>
          <div>
            <h3 class="panel-title">JSON 預覽圖</h3>
            <canvas id="previewCanvas" width="700" height="500"></canvas>
          </div>
        </div>
        <div class="small">這版會強制套用固定拓撲：上導線、R-L 中間短連線、下導線，並用 OCR 讀 V / R / L 的數值。</div>
        <ul class="list">
          <li>左側找 1 個來源元件（預設 V）</li>
          <li>右側上方找 R、下方找 L、最下方找 GND</li>
          <li>輸出直接對齊你提供的 JSON 格式</li>
        </ul>
      </div>
      <div class="card">
        <h3 class="panel-title">輸出 JSON</h3>
        <textarea id="output"></textarea>
      </div>
    </div>
  </div>

  <script>
    window.Module = {
      onRuntimeInitialized() {
        window.cvReady = true;
        setStatus('OpenCV.js 已載入，可以開始辨識');
        document.getElementById('processBtn').disabled = false;
      }
    };
  </script>
  <script async src="https://docs.opencv.org/4.x/opencv.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <script>
    const GRID = 20;
    const FREQ_HZ = 60;

    const statusEl = document.getElementById('status');
    const imageInput = document.getElementById('imageInput');
    const processBtn = document.getElementById('processBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const demoBtn = document.getElementById('demoBtn');
    const outputEl = document.getElementById('output');
    const srcCanvas = document.getElementById('srcCanvas');
    const dstCanvas = document.getElementById('dstCanvas');
    const previewCanvas = document.getElementById('previewCanvas');
    const srcCtx = srcCanvas.getContext('2d');
    const dstCtx = dstCanvas.getContext('2d');
    const previewCtx = previewCanvas.getContext('2d');

    let loadedImage = null;
    let lastResult = null;

    function setStatus(text) { statusEl.textContent = text; }
    function snap(v) { return Math.round(v / GRID) * GRID; }
    function uid(prefix) { return prefix + '_' + Math.random().toString(36).slice(2, 10); }

    function clearCanvas(ctx, canvas) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function fitAndDrawImage(img, ctx, canvas) {
      clearCanvas(ctx, canvas);
      const scale = Math.min(canvas.width / img.width, canvas.height / img.height);
      const w = img.width * scale;
      const h = img.height * scale;
      const x = (canvas.width - w) / 2;
      const y = (canvas.height - h) / 2;
      ctx.drawImage(img, x, y, w, h);
    }

    function loadImageToCanvas(file) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          loadedImage = img;
          fitAndDrawImage(img, srcCtx, srcCanvas);
          fitAndDrawImage(img, dstCtx, dstCanvas);
          resolve(img);
        };
        img.onerror = reject;
        img.src = URL.createObjectURL(file);
      });
    }

    imageInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      try {
        await loadImageToCanvas(file);
        setStatus('圖片已載入，請按「開始辨識」');
      } catch (err) {
        console.error(err);
        setStatus('圖片載入失敗');
      }
    });

    processBtn.addEventListener('click', async () => {
      if (!window.cvReady) return alert('OpenCV.js 尚未載入完成');
      if (!loadedImage) return alert('請先上傳圖片');
      try {
        setStatus('辨識中…');
        const result = await processCircuitImage();
        lastResult = result;
        outputEl.value = JSON.stringify(result, null, 2);
        drawJsonPreview(result);
        const copied = await copyJsonToClipboard(result);
        setStatus(copied ? '辨識完成，JSON 已自動複製' : '辨識完成，但自動複製失敗');
      } catch (err) {
        console.error(err);
        setStatus('辨識失敗：' + err.message);
      }
    });

    downloadBtn.addEventListener('click', () => {
      if (lastResult) return exportJsonFile(lastResult, 'circuit.json');
      try {
        exportJsonFile(JSON.parse(outputEl.value || '{}'), 'circuit.json');
      } catch (_) {
        alert('目前沒有有效 JSON 可下載');
      }
    });

    demoBtn.addEventListener('click', async () => {
      const result = buildReferenceDemo();
      lastResult = result;
      outputEl.value = JSON.stringify(result, null, 2);
      drawDetectionOverlay(result);
      drawJsonPreview(result);
      await copyJsonToClipboard(result);
      setStatus('已載入示範結果，JSON 已自動複製');
    });

    async function processCircuitImage() {
      const src = cv.imread(srcCanvas);
      const gray = new cv.Mat();
      const binary = new cv.Mat();
      const clean = new cv.Mat();
      cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
      cv.GaussianBlur(gray, gray, new cv.Size(5, 5), 0, 0, cv.BORDER_DEFAULT);
      cv.threshold(gray, binary, 0, 255, cv.THRESH_BINARY_INV + cv.THRESH_OTSU);
      removeTextLikeContours(binary, clean);
      cv.cvtColor(clean, src, cv.COLOR_GRAY2RGBA);
      cv.imshow(dstCanvas, src);

      const anchors = detectAnchors(clean);
      const result = await buildSpecializedJson(anchors);
      drawDetectionOverlay(result);

      gray.delete();
      binary.delete();
      clean.delete();
      src.delete();
      return result;
    }

    function removeTextLikeContours(srcBinary, outBinary) {
      srcBinary.copyTo(outBinary);
      const contours = new cv.MatVector();
      const hierarchy = new cv.Mat();
      cv.findContours(srcBinary, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
      for (let i = 0; i < contours.size(); i++) {
        const cnt = contours.get(i);
        const rect = cv.boundingRect(cnt);
        const area = cv.contourArea(cnt);
        const w = rect.width, h = rect.height;
        const aspect = w / Math.max(h, 1);
        const fillRatio = area / Math.max(w * h, 1);
        const likelyText = (
          (w >= 8 && w <= 95 && h >= 6 && h <= 22 && aspect >= 1.7) ||
          (w >= 7 && w <= 18 && h >= 7 && h <= 24 && fillRatio > 0.08 && fillRatio < 0.72) ||
          (w <= 14 && h <= 14)
        );
        if (likelyText) {
          const p = 2;
          const x = Math.max(0, rect.x - p);
          const y = Math.max(0, rect.y - p);
          const ww = Math.min(outBinary.cols - x, rect.width + p * 2);
          const hh = Math.min(outBinary.rows - y, rect.height + p * 2);
          const roi = outBinary.roi(new cv.Rect(x, y, ww, hh));
          roi.setTo(new cv.Scalar(0));
          roi.delete();
        }
        cnt.delete();
      }
      contours.delete();
      hierarchy.delete();
    }

    function detectAnchors(binaryMat) {
      const contours = new cv.MatVector();
      const hierarchy = new cv.Mat();
      const circles = [];
      const verticals = [];
      const grounds = [];

      cv.findContours(binaryMat, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

      for (let i = 0; i < contours.size(); i++) {
        const cnt = contours.get(i);
        const rect = cv.boundingRect(cnt);
        const area = cv.contourArea(cnt);
        const w = rect.width, h = rect.height;
        const cx = snap(rect.x + w / 2);
        const cy = snap(rect.y + h / 2);
        const aspect = w / Math.max(h, 1);
        const fillRatio = area / Math.max(w * h, 1);

        if (w >= 24 && h >= 24 && aspect > 0.75 && aspect < 1.25 && fillRatio > 0.30 && fillRatio < 0.88) {
          circles.push({ x: cx, y: cy, rect: { ...rect } });
        } else if (h >= 34 && h <= 118 && w >= 10 && w <= 34) {
          verticals.push({ x: cx, y: cy, w, h, fillRatio });
        } else if (cy > srcCanvas.height * 0.55 && w >= 16 && w <= 54 && h >= 10 && h <= 24 && fillRatio < 0.36) {
          grounds.push({ x: cx, y: cy });
        }
        cnt.delete();
      }

      contours.delete();
      hierarchy.delete();

      circles.sort((a, b) => a.x - b.x);
      verticals.sort((a, b) => a.y - b.y);
      grounds.sort((a, b) => b.y - a.y);

      const source = circles[0] || { x: 160, y: 280, rect: { x: 130, y: 250, width: 60, height: 60 } };

      const rightSide = verticals.filter(v => v.x > source.x + 80);
      let resistor = null;
      let inductor = null;
      for (const v of rightSide) {
        if (!resistor && v.fillRatio >= 0.18) resistor = v;
        else if (!inductor) inductor = v;
      }
      resistor = resistor || { x: 380, y: 200 };
      inductor = inductor || { x: 380, y: 380 };

      const gnd = grounds[0] || { x: inductor.x, y: inductor.y + 100 };

      return { source, resistor, inductor, gnd };
    }

    async function buildSpecializedJson(anchors) {
      const xLeft = snap(anchors.source.x);
      const xRight = snap(Math.max(anchors.resistor.x, anchors.inductor.x, anchors.gnd.x));

      const vY = snap(anchors.source.y);
      let rY = snap(anchors.resistor.y);
      let lY = snap(anchors.inductor.y);
      if (lY <= rY + 100) lY = snap(rY + 180);
      const gY = snap(Math.max(anchors.gnd.y + 20, lY + 100));

      const v = {
        id: uid('v'), type: 'V', name: 'V1', x: xLeft, y: vY,
        a: { x: xLeft, y: snap(vY - 80) },
        b: { x: xLeft, y: snap(vY + 80) },
        rotation: 90,
        value: ''
      };

      const r = {
        id: uid('r'), type: 'R', name: 'R1', x: xRight, y: rY,
        a: { x: xRight, y: snap(rY - 80) },
        b: { x: xRight, y: snap(rY + 80) },
        rotation: 90,
        value: ''
      };

      const l = {
        id: uid('l'), type: 'L', name: 'L1', x: xRight, y: lY,
        a: { x: xRight, y: snap(lY - 80) },
        b: { x: xRight, y: snap(lY + 80) },
        rotation: 90,
        value: ''
      };

      const g = {
        id: uid('g'), type: 'GND', name: 'GND', x: xRight, y: gY,
        p: { x: xRight, y: snap(gY - 20) }
      };

      const wires = [
        {
          id: uid('w'),
          points: [
            { x: r.a.x, y: r.a.y },
            { x: v.a.x, y: r.a.y },
            { x: v.a.x, y: v.a.y }
          ]
        },
        {
          id: uid('w'),
          points: [
            { x: r.b.x, y: r.b.y },
            { x: l.a.x, y: l.a.y }
          ]
        },
        {
          id: uid('w'),
          points: [
            { x: l.b.x, y: l.b.y },
            { x: v.b.x, y: l.b.y },
            { x: v.b.x, y: v.b.y }
          ]
        },
        {
          id: uid('w'),
          points: [
            { x: l.b.x, y: l.b.y },
            { x: g.p.x, y: g.p.y }
          ]
        }
      ];

      return {
        version: 2,
        grid: GRID,
        junctions: [],
        wires,
        freqHz: FREQ_HZ,
        elements: [g, v, r, l]
      };
    }

    async function readTextNear(box, fallback) {
      return fallback;
    }

    function cleanOcrText(text) {
      return (text || '')
        .replace(/\s+/g, ' ')
        .replace(/[^0-9a-zA-Z+\-\.jJΩ∠° ]/g, '')
        .trim()
        .slice(0, 24);
    }

    async function copyJsonToClipboard(data) {
      const jsonText = JSON.stringify(data, null, 2);
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(jsonText);
          return true;
        }
        const ta = document.createElement('textarea');
        ta.value = jsonText;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        const ok = document.execCommand('copy');
        document.body.removeChild(ta);
        return !!ok;
      } catch {
        return false;
      }
    }

    function exportJsonFile(data, filename = 'circuit.json') {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function drawDetectionOverlay(result) {
      if (loadedImage) fitAndDrawImage(loadedImage, dstCtx, dstCanvas);
      else clearCanvas(dstCtx, dstCanvas);
      dstCtx.strokeStyle = '#2563eb';
      dstCtx.lineWidth = 2;
      for (const wire of (result.wires || [])) {
        dstCtx.beginPath();
        dstCtx.moveTo(wire.points[0].x, wire.points[0].y);
        for (let i = 1; i < wire.points.length; i++) dstCtx.lineTo(wire.points[i].x, wire.points[i].y);
        dstCtx.stroke();
      }
      for (const el of (result.elements || [])) {
        dstCtx.strokeStyle = '#dc2626';
        dstCtx.strokeRect(el.x - 24, el.y - 24, 48, 48);
        dstCtx.fillStyle = '#dc2626';
        dstCtx.font = '14px Arial';
        dstCtx.fillText((el.type || '?') + ':' + (el.name || ''), el.x + 8, el.y - 8);
      }
    }

    function drawJsonPreview(result) {
      clearCanvas(previewCtx, previewCanvas);
      previewCtx.strokeStyle = '#e5e7eb';
      previewCtx.lineWidth = 1;
      for (let x = 0; x <= previewCanvas.width; x += GRID) {
        previewCtx.beginPath(); previewCtx.moveTo(x, 0); previewCtx.lineTo(x, previewCanvas.height); previewCtx.stroke();
      }
      for (let y = 0; y <= previewCanvas.height; y += GRID) {
        previewCtx.beginPath(); previewCtx.moveTo(0, y); previewCtx.lineTo(previewCanvas.width, y); previewCtx.stroke();
      }
      previewCtx.strokeStyle = '#2563eb';
      previewCtx.lineWidth = 3;
      for (const wire of (result.wires || [])) {
        previewCtx.beginPath();
        previewCtx.moveTo(wire.points[0].x, wire.points[0].y);
        for (let i = 1; i < wire.points.length; i++) previewCtx.lineTo(wire.points[i].x, wire.points[i].y);
        previewCtx.stroke();
      }
      for (const el of (result.elements || [])) drawSymbol(previewCtx, el);
    }

    function drawSymbol(ctx, el) {
      ctx.save();
      ctx.translate(el.x, el.y);
      ctx.rotate(((el.rotation || 0) * Math.PI) / 180);
      ctx.strokeStyle = '#111827';
      ctx.fillStyle = '#111827';
      ctx.lineWidth = 3;
      ctx.font = '14px Arial';
      if (el.type === 'R') {
        ctx.beginPath(); ctx.moveTo(0, -40); ctx.lineTo(0, -25);
        let y = -25; const step = 8; const amp = 10;
        for (let i = 0; i < 6; i++) { ctx.lineTo(i % 2 === 0 ? amp : -amp, y + step); y += step; }
        ctx.lineTo(0, 25); ctx.lineTo(0, 40); ctx.stroke();
      } else if (el.type === 'L') {
        ctx.beginPath(); ctx.moveTo(0, -40); ctx.lineTo(0, -22); ctx.stroke();
        for (let i = 0; i < 4; i++) { ctx.beginPath(); ctx.arc(0, -14 + i * 10, 8, Math.PI / 2, -Math.PI / 2, true); ctx.stroke(); }
        ctx.beginPath(); ctx.moveTo(0, 22); ctx.lineTo(0, 40); ctx.stroke();
      } else if (el.type === 'V') {
        ctx.beginPath(); ctx.moveTo(0, -40); ctx.lineTo(0, -20); ctx.moveTo(0, 20); ctx.lineTo(0, 40); ctx.stroke();
        ctx.beginPath(); ctx.arc(0, 0, 20, 0, Math.PI * 2); ctx.stroke();
        ctx.fillText('+', 10, 4); ctx.fillText('-', -16, 4);
      } else if (el.type === 'GND') {
        ctx.beginPath(); ctx.moveTo(0, -20); ctx.lineTo(0, 0); ctx.moveTo(-16, 0); ctx.lineTo(16, 0); ctx.moveTo(-10, 8); ctx.lineTo(10, 8); ctx.moveTo(-5, 16); ctx.lineTo(5, 16); ctx.stroke();
      }
      ctx.rotate(-((el.rotation || 0) * Math.PI) / 180);
      ctx.fillText(el.name || el.type, 14, -14);
      ctx.restore();
    }

    function buildReferenceDemo() {
      return {
        version: 2,
        grid: 20,
        junctions: [],
        wires: [
          { id: uid('w'), points: [{ x: 380, y: 120 }, { x: 160, y: 120 }, { x: 160, y: 200 }] },
          { id: uid('w'), points: [{ x: 380, y: 280 }, { x: 380, y: 300 }] },
          { id: uid('w'), points: [{ x: 380, y: 460 }, { x: 160, y: 460 }, { x: 160, y: 360 }] }
        ],
        freqHz: 60,
        elements: [
          { id: uid('g'), type: 'GND', name: 'GND', x: 380, y: 480, p: { x: 380, y: 460 } },
          { id: uid('v'), type: 'V', name: 'V1', x: 160, y: 280, a: { x: 160, y: 200 }, b: { x: 160, y: 360 }, rotation: 90, value: '20∠60°' },
          { id: uid('r'), type: 'R', name: 'R1', x: 380, y: 200, a: { x: 380, y: 120 }, b: { x: 380, y: 280 }, rotation: 90, value: '5' },
          { id: uid('l'), type: 'L', name: 'L1', x: 380, y: 380, a: { x: 380, y: 300 }, b: { x: 380, y: 460 }, rotation: 90, value: '5j' }
        ]
      };
    }

    outputEl.value = JSON.stringify({ version: 2, grid: 20, junctions: [], wires: [], freqHz: 60, elements: [] }, null, 2);
    clearCanvas(srcCtx, srcCanvas);
    clearCanvas(dstCtx, dstCanvas);
    clearCanvas(previewCtx, previewCanvas);
  </script>
</body>
</html>
