<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Grid 電路圖辨識 → JSON（四分割 + Junction 抑制 + Ensemble 接口）</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,"Microsoft JhengHei",sans-serif;background:#f3f4f6;color:#111827}
    .wrap{max-width:1600px;margin:0 auto;padding:18px}
    h1{margin:0 0 8px;font-size:24px}
    .hint{margin:0 0 14px;color:#4b5563;line-height:1.6}
    .bar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:10px 0 14px}
    input[type=file]{background:#fff;border:1px solid #d1d5db;border-radius:10px;padding:10px}
    button{border:0;border-radius:10px;padding:10px 14px;font-weight:800;cursor:pointer}
    .b1{background:#2563eb;color:#fff}
    .b2{background:#16a34a;color:#fff}
    .b3{background:#374151;color:#fff}
    .status{background:#e0f2fe;color:#075985;padding:10px 12px;border-radius:10px;font-size:14px}
    .grid{display:grid;grid-template-columns:1.35fr 1fr;gap:16px}
    .card{background:#fff;border-radius:16px;padding:14px;box-shadow:0 6px 20px rgba(0,0,0,.08)}
    .cvgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
    canvas{width:100%;border:1px solid #d1d5db;border-radius:12px;background:#fff}
    textarea{width:100%;min-height:640px;border:1px solid #d1d5db;border-radius:12px;padding:12px;font-family:Consolas,monospace;font-size:13px;line-height:1.55;resize:vertical}
    .small{margin-top:10px;color:#6b7280;font-size:13px;line-height:1.6}
    @media (max-width:1100px){.grid{grid-template-columns:1fr}.cvgrid{grid-template-columns:1fr}textarea{min-height:360px}}
  </style>
</head>
<body>
<div class="wrap">
  <h1>Grid 電路圖辨識 → JSON</h1>
  <p class="hint">
    這版重點：<b>把圖片切成四塊</b>（2×2）局部化處理，並加入 <b>Junction 抑制</b> 避免把接點誤判成電壓源。
    多模型 TFJS 接口保留，沒模型也能跑（用 OCR）。
  </p>

  <div class="status" id="status">載入中…</div>

  <div class="bar">
    <input id="file" type="file" accept="image/*" />
    <label style="display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #d1d5db;border-radius:10px;padding:8px 10px">
      <span style="font-weight:800;color:#374151">格子大小</span>
      <input id="cell" type="number" value="20" min="10" max="60" style="width:84px;padding:6px;border:1px solid #d1d5db;border-radius:8px">
      <span style="color:#6b7280;font-size:12px">px</span>
    </label>

    <button class="b1" id="run" disabled>開始辨識</button>
    <button class="b2" id="download">下載 JSON</button>
    <button class="b3" id="toggleDebug">切換 Debug</button>
  </div>

  <div class="grid">
    <div class="card">
      <div class="cvgrid">
        <div>
          <div style="font-weight:800;margin:0 0 8px">原始圖片</div>
          <canvas id="src" width="900" height="560"></canvas>
        </div>
        <div>
          <div style="font-weight:800;margin:0 0 8px">Debug（Grid/線/接點/框）</div>
          <canvas id="mid" width="900" height="560"></canvas>
        </div>
        <div>
          <div style="font-weight:800;margin:0 0 8px">JSON 預覽圖</div>
          <canvas id="preview" width="900" height="560"></canvas>
        </div>
      </div>
      <div class="small">
        流程：四分割 → 每塊做 Grid/線/接點 → 抑制 junction 旁小 cluster → 生成 elements/wires → 映射回原圖合併 → (可選) 值辨識。<br>
        值：先 TF 多模型（若有）再 OCR（Tesseract）補救；後處理：<b>-j → C</b>、<b>j → L</b>。
      </div>
    </div>

    <div class="card">
      <div style="font-weight:800;margin:0 0 8px">輸出 JSON</div>
      <textarea id="out"></textarea>
    </div>
  </div>
</div>

<!-- OCR -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<!-- TFJS -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const statusEl = $("status");
  const fileEl = $("file");
  const runEl = $("run");
  const dlEl = $("download");
  const toggleDebugEl = $("toggleDebug");
  const cellEl = $("cell");
  const outEl = $("out");

  const srcC = $("src"), midC = $("mid"), prevC = $("preview");
  const srcCtx = srcC.getContext("2d");
  const midCtx = midC.getContext("2d");
  const prevCtx = prevC.getContext("2d");

  let img = null;
  let debug = true;
  let lastJson = null;

  // ====== 基本工具 ======
  const snap = (v, cell) => Math.round(v / cell) * cell;
  const uid = (p) => p + "_" + Math.random().toString(36).slice(2, 10);

  function setStatus(s){ statusEl.textContent = s; }
  function clearCanvas(ctx, c){
    ctx.clearRect(0,0,c.width,c.height);
    ctx.fillStyle="#fff";
    ctx.fillRect(0,0,c.width,c.height);
  }
  function fitDraw(image, ctx, canvas){
    clearCanvas(ctx, canvas);
    const scale = Math.min(canvas.width / image.width, canvas.height / image.height);
    const w = image.width * scale, h = image.height * scale;
    const x = (canvas.width - w)/2, y = (canvas.height - h)/2;
    ctx.drawImage(image, x, y, w, h);
    return {x,y,w,h,scale};
  }

  async function copyJson(obj){
    const text = JSON.stringify(obj, null, 2);
    try{
      if(navigator.clipboard && window.isSecureContext){
        await navigator.clipboard.writeText(text);
        return true;
      }
      const ta = document.createElement("textarea");
      ta.value = text; ta.style.position="fixed"; ta.style.left="-9999px";
      document.body.appendChild(ta);
      ta.select();
      const ok = document.execCommand("copy");
      document.body.removeChild(ta);
      return !!ok;
    }catch{ return false; }
  }

  function downloadJson(obj, name="circuit.json"){
    const blob = new Blob([JSON.stringify(obj,null,2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href=url; a.download=name;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // ============================================================
  // =================== 四分割（2×2） ===========================
  // ============================================================
  function splitCanvas4(srcCanvas){
    const w = srcCanvas.width, h = srcCanvas.height;
    const halfW = Math.floor(w/2), halfH = Math.floor(h/2);

    const tiles = [];
    const rects = [
      {tx:0, ty:0, x:0,     y:0,     w:halfW,     h:halfH},      // TL
      {tx:1, ty:0, x:halfW, y:0,     w:w-halfW,   h:halfH},      // TR
      {tx:0, ty:1, x:0,     y:halfH, w:halfW,     h:h-halfH},    // BL
      {tx:1, ty:1, x:halfW, y:halfH, w:w-halfW,   h:h-halfH},    // BR
    ];

    for(const r of rects){
      const c = document.createElement("canvas");
      c.width = r.w; c.height = r.h;
      const ctx = c.getContext("2d");
      ctx.fillStyle = "#fff";
      ctx.fillRect(0,0,c.width,c.height);
      ctx.drawImage(srcCanvas, r.x, r.y, r.w, r.h, 0, 0, r.w, r.h);
      tiles.push({canvas:c, ...r});
    }
    return tiles;
  }

  function offsetPoint(p, ox, oy){ return {x: p.x + ox, y: p.y + oy}; }
  function offsetWire(wire, ox, oy){
    return { id: wire.id, points: wire.points.map(p => offsetPoint(p, ox, oy)) };
  }
  function offsetElement(el, ox, oy){
    const out = {...el};
    out.x += ox; out.y += oy;
    if(out.a) out.a = offsetPoint(out.a, ox, oy);
    if(out.b) out.b = offsetPoint(out.b, ox, oy);
    if(out.p) out.p = offsetPoint(out.p, ox, oy);
    return out;
  }

  // ============================================================
  // =================== TF 多模型（保留） ========================
  // ============================================================
  // 你要用就把模型路徑解除註解即可；沒模型也不會壞
  const TF_MODELS = [
    // value：數值文字辨識（CTC）
    // { name:"value_ctc_1", url:"./models/value_ctc_1/model.json", kind:"layers", task:"value", weight:1.0, inputSize:[64,192],
    //   charset:"0123456789.+-jJkKmMuUnNpPfFΩVvHh", decoder:"ctc" },

    // type：元件類型分類（classes）
    // { name:"type_cls_1", url:"./models/type_cls_1/model.json", kind:"layers", task:"type", weight:1.0, inputSize:[96,96],
    //   classes:["R","L","C","V","GND"], decoder:"classmap" }
  ];
  let tfLoaded = false;
  let tfModels = [];

  async function loadTfModelsIfAny(){
    if(tfLoaded) return;
    tfLoaded = true;
    tfModels = [];
    for(const cfg of TF_MODELS){
      try{
        let model = null;
        if(cfg.kind === "graph") model = await tf.loadGraphModel(cfg.url);
        else model = await tf.loadLayersModel(cfg.url);
        tfModels.push({...cfg, model});
        console.log("[TF] loaded:", cfg.name);
      }catch(e){
        console.warn("[TF] load failed:", cfg.name, e);
      }
    }
  }

  function canvasToInputTensor(cropCanvas, inputH, inputW, gray=true){
    return tf.tidy(() => {
      let t = tf.browser.fromPixels(cropCanvas);
      t = tf.image.resizeBilinear(t, [inputH, inputW]);
      if(gray) t = tf.mean(t, 2).expandDims(2);
      t = t.toFloat().div(255.0);
      t = tf.sub(1.0, t);
      t = t.expandDims(0);
      return t;
    });
  }
  function softmax(arr){
    const m = Math.max(...arr);
    const exps = arr.map(v => Math.exp(v - m));
    const sum = exps.reduce((a,b)=>a+b,0) || 1;
    return exps.map(v => v/sum);
  }
  function argmax(arr){
    let idx=0, best=arr[0] ?? -Infinity;
    for(let i=1;i<arr.length;i++){ if(arr[i]>best){best=arr[i];idx=i;} }
    return idx;
  }
  function decodeClassMap(outputArray, classes=[]){
    if(!classes.length || !outputArray.length) return {text:"", conf:0};
    const probs = softmax(outputArray);
    const idx = argmax(probs);
    return { text: classes[idx] || "", conf: probs[idx] || 0 };
  }
  function decodeCTCFlat(flat, charset=""){
    if(!flat?.length || !charset) return {text:"", conf:0};
    const numClasses = charset.length + 1;
    const T = Math.floor(flat.length / numClasses);
    if(T <= 0) return {text:"", conf:0};

    let text="", confSum=0, confCnt=0, prev=-1;
    for(let t=0;t<T;t++){
      const row = flat.slice(t*numClasses, (t+1)*numClasses);
      const probs = softmax(row);
      const idx = argmax(probs);
      if(idx===charset.length){ prev=idx; continue; }
      if(idx!==prev){
        text += charset[idx] || "";
        confSum += probs[idx] || 0;
        confCnt++;
      }
      prev=idx;
    }
    return { text:text.trim(), conf: confCnt?(confSum/confCnt):0 };
  }
  function cleanPredictedValue(text){
    let s=(text||"").replace(/\s+/g,"");
    s=s.replace(/O/g,"0").replace(/o/g,"0");
    s=s.replace(/—/g,"-").replace(/﹣/g,"-");
    s=s.replace(/，/g,".").replace(/,/g,".");
    s=s.replace(/ohm/gi,"Ω").replace(/omega/gi,"Ω");
    s=s.replace(/[^0-9A-Za-z.+\-Ω]/g,"");
    return s;
  }

  async function tfEnsemblePredict(cropCanvas, task="value"){
    await loadTfModelsIfAny();
    const usable = tfModels.filter(m => m.task === task);
    if(!usable.length) return {text:"", conf:0, source:"none"};

    const results=[];
    for(const m of usable){
      try{
        const [H,W] = m.inputSize || [64,192];
        const input = canvasToInputTensor(cropCanvas, H, W, true);

        let outTensor = (m.kind==="graph") ? m.model.execute(input) : m.model.predict(input);
        if(Array.isArray(outTensor)) outTensor = outTensor[0];

        const data = await outTensor.data();
        const arr = Array.from(data);

        let decoded={text:"", conf:0};
        if(m.decoder==="classmap") decoded = decodeClassMap(arr, m.classes||[]);
        else decoded = decodeCTCFlat(arr, m.charset||"");

        results.push({
          text: cleanPredictedValue(decoded.text),
          conf: decoded.conf || 0,
          weight: m.weight || 1
        });

        tf.dispose([input, outTensor]);
      }catch(e){
        console.warn("[TF] predict failed:", m.name, e);
      }
    }

    const vote=new Map();
    for(const r of results){
      if(!r.text) continue;
      const score = (r.conf||0) * (r.weight||1);
      vote.set(r.text, (vote.get(r.text)||0) + score);
    }
    if(!vote.size) return {text:"", conf:0, source:"tf", raw:results};

    let bestText="", bestScore=-Infinity, total=0;
    for(const [txt,score] of vote.entries()){
      total += score;
      if(score>bestScore){bestScore=score;bestText=txt;}
    }
    const conf = total>0 ? (bestScore/total) : 0;
    return {text:bestText, conf, source:"tf", raw:results};
  }

  // ============================================================
  // =================== 影像 → Grid ============================
  // ============================================================
  function buildGridFromCanvas(canvas, cellSize){
    const ctx = canvas.getContext("2d");
    const {width, height} = canvas;
    const cols = Math.floor(width / cellSize);
    const rows = Math.floor(height / cellSize);
    const imgData = ctx.getImageData(0,0,width,height).data;

    const grid = Array.from({length: rows}, (_,gy)=>Array.from({length: cols}, (_,gx)=>({
      gx, gy,
      kind:"empty", // empty | wire | junction | symbol
      black:0,
      wire:{up:false,right:false,down:false,left:false},
    })));

    const idx = (x,y)=> (y*width + x)*4;
    function lumAt(x,y){
      const i = idx(x,y);
      const r=imgData[i], g=imgData[i+1], b=imgData[i+2];
      return (0.299*r + 0.587*g + 0.114*b);
    }
    function isBlack(x,y,thr=160){ return lumAt(x,y) < thr; }

    // cell 黑比率 + 中線抽樣判線
    for(let gy=0; gy<rows; gy++){
      for(let gx=0; gx<cols; gx++){
        const x0 = gx*cellSize, y0 = gy*cellSize;
        let blackCnt=0, total=0;

        const step = Math.max(2, Math.floor(cellSize/10));
        for(let y=y0; y<y0+cellSize; y+=step){
          for(let x=x0; x<x0+cellSize; x+=step){
            total++;
            if(isBlack(x,y)) blackCnt++;
          }
        }
        const blackRatio = blackCnt / Math.max(total,1);
        grid[gy][gx].black = blackRatio;

        const midY = y0 + (cellSize>>1);
        const midX = x0 + (cellSize>>1);

        let hCnt=0, vCnt=0;
        for(let x=x0+2; x<x0+cellSize-2; x+=2){
          if(isBlack(x, midY)) hCnt++;
        }
        for(let y=y0+2; y<y0+cellSize-2; y+=2){
          if(isBlack(midX, y)) vCnt++;
        }
        const hScore = hCnt / Math.max((cellSize/2),1);
        const vScore = vCnt / Math.max((cellSize/2),1);

        const isWire = (blackRatio > 0.06 && blackRatio < 0.55) && (hScore > 0.35 || vScore > 0.35);
        if(isWire) grid[gy][gx].kind = "wire";
      }
    }

    // 線方向：看鄰格 wire/junction
    for(let gy=0; gy<rows; gy++){
      for(let gx=0; gx<cols; gx++){
        const c = grid[gy][gx];
        if(c.kind !== "wire") continue;

        const up = gy>0 ? grid[gy-1][gx] : null;
        const dn = gy<rows-1 ? grid[gy+1][gx] : null;
        const lf = gx>0 ? grid[gy][gx-1] : null;
        const rt = gx<cols-1 ? grid[gy][gx+1] : null;

        c.wire.up = !!(up && (up.kind==="wire" || up.kind==="junction"));
        c.wire.down = !!(dn && (dn.kind==="wire" || dn.kind==="junction"));
        c.wire.left = !!(lf && (lf.kind==="wire" || lf.kind==="junction"));
        c.wire.right = !!(rt && (rt.kind==="wire" || rt.kind==="junction"));
      }
    }

    // junction：deg>=3
    for(let gy=0; gy<rows; gy++){
      for(let gx=0; gx<cols; gx++){
        const c = grid[gy][gx];
        if(c.kind !== "wire") continue;
        const deg = (c.wire.up?1:0)+(c.wire.right?1:0)+(c.wire.down?1:0)+(c.wire.left?1:0);
        if(deg >= 3) c.kind = "junction";
      }
    }

    return {grid, rows, cols, cellSize};
  }

  // ============================================================
  // ================= Junction 抑制（重點） ======================
  // ============================================================
  function buildJunctionMap(gridPack){
    const {grid, rows, cols} = gridPack;
    const isJ = Array.from({length: rows}, ()=>Array(cols).fill(false));
    for(let y=0;y<rows;y++){
      for(let x=0;x<cols;x++){
        if(grid[y][x].kind==="junction") isJ[y][x]=true;
      }
    }
    return isJ;
  }

  function nearJunction(isJ, x, y, r=1){
    const rows = isJ.length, cols = isJ[0].length;
    for(let dy=-r; dy<=r; dy++){
      for(let dx=-r; dx<=r; dx++){
        const nx=x+dx, ny=y+dy;
        if(nx<0||ny<0||nx>=cols||ny>=rows) continue;
        if(isJ[ny][nx]) return true;
      }
    }
    return false;
  }

  // ============================================================
  // =================== 找元件 cluster ==========================
  // ============================================================
  function detectSymbolClusters(gridPack){
    const {grid, rows, cols} = gridPack;

    // junction map
    const isJ = buildJunctionMap(gridPack);

    // 先把疑似元件格標成 symbol candidate（junction 周邊排除）
    for(let y=0; y<rows; y++){
      for(let x=0; x<cols; x++){
        const c = grid[y][x];
        if(c.kind==="wire" || c.kind==="junction") continue;

        // junction 周邊 1 格內不當 symbol（避免接點被當元件）
        if(nearJunction(isJ, x, y, 1)) continue;

        if(c.black > 0.12) c.kind = "symbol";
      }
    }

    const clusters = [];
    const visited = new Set();
    const key = (x,y)=>`${x},${y}`;

    function bfs(sx,sy){
      const q=[[sx,sy]];
      visited.add(key(sx,sy));
      const cells=[];
      let minX=sx,maxX=sx,minY=sy,maxY=sy;
      while(q.length){
        const [x,y]=q.shift();
        cells.push({x,y});
        minX=Math.min(minX,x); maxX=Math.max(maxX,x);
        minY=Math.min(minY,y); maxY=Math.max(maxY,y);
        for(const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]){
          const nx=x+dx, ny=y+dy;
          if(nx<0||ny<0||nx>=cols||ny>=rows) continue;
          const k=key(nx,ny);
          if(visited.has(k)) continue;
          if(grid[ny][nx].kind!=="symbol") continue;
          visited.add(k);
          q.push([nx,ny]);
        }
      }
      return {cells, minX,maxX,minY,maxY};
    }

    for(let y=0; y<rows; y++){
      for(let x=0; x<cols; x++){
        const c=grid[y][x];
        if(c.kind!=="symbol") continue;
        const k=key(x,y);
        if(visited.has(k)) continue;

        const cl=bfs(x,y);

        // 過小 cluster 多半雜訊，丟
        if(cl.cells.length < 3) continue;

        // 第二道保險：bbox 小且靠近 junction → 當接點擴散丟掉
        const w = cl.maxX - cl.minX + 1;
        const h = cl.maxY - cl.minY + 1;
        const tiny = (w<=2 && h<=2) || (cl.cells.length<=5);
        if(tiny){
          const cx = Math.round((cl.minX+cl.maxX)/2);
          const cy = Math.round((cl.minY+cl.maxY)/2);
          if(nearJunction(isJ, cx, cy, 2)) continue;
        }

        clusters.push(cl);
      }
    }
    return clusters;
  }

  // ============================================================
  // =================== 元件分類（fallback） =====================
  // ============================================================
  function guessSymbolType(cluster){
    const {minX,maxX,minY,maxY} = cluster;
    const w = maxX-minX+1;
    const h = maxY-minY+1;

    // 不再把正方形粗判成 V（就是你出問題的主因）
    // 先全部回到 R，等你之後用模型修正
    if (h >= w+2) return {type:"R", rot:90, conf:0.40};
    if (w >= h+2) return {type:"R", rot:0, conf:0.40};
    return {type:"R", rot:90, conf:0.25};
  }

  // ============================================================
  // =================== cluster → element =======================
  // ============================================================
  function clusterToElement(cluster, cls, gridPack){
    const {cellSize} = gridPack;
    const cx = snap(((cluster.minX + cluster.maxX + 1)/2) * cellSize, cellSize);
    const cy = snap(((cluster.minY + cluster.maxY + 1)/2) * cellSize, cellSize);
    const type = cls.type;
    const rotation = cls.rot;

    const el = { id: uid(type.toLowerCase()), type, name: type, x: cx, y: cy, rotation, value: "" };

    const half = 4 * cellSize;
    if(type === "GND"){
      el.p = {x: cx, y: cy - cellSize};
      return el;
    }
    if(rotation === 0 || rotation === 180){
      el.a = {x: cx - half, y: cy};
      el.b = {x: cx + half, y: cy};
    }else{
      el.a = {x: cx, y: cy - half};
      el.b = {x: cx, y: cy + half};
    }
    return el;
  }

  // ============================================================
  // =================== 線追蹤（tile 內） =======================
  // ============================================================
  function traceWires(gridPack){
    const {grid, rows, cols, cellSize} = gridPack;
    const visited = new Set();
    const key = (x,y)=>`${x},${y}`;
    const pointsOf = (x,y)=>({x: snap(x*cellSize + cellSize/2, cellSize), y: snap(y*cellSize + cellSize/2, cellSize)});

    function neighbors(x,y){
      const c = grid[y][x];
      const out=[];
      if(c.wire.up && y>0) out.push([x,y-1]);
      if(c.wire.down && y<rows-1) out.push([x,y+1]);
      if(c.wire.left && x>0) out.push([x-1,y]);
      if(c.wire.right && x<cols-1) out.push([x+1,y]);
      return out.filter(([nx,ny]) => {
        const k=key(nx,ny);
        const cc=grid[ny][nx];
        return (cc.kind==="wire"||cc.kind==="junction") && !visited.has(k);
      });
    }

    function simplify(pts){
      if(pts.length<=2) return pts;
      const out=[pts[0]];
      for(let i=1;i<pts.length-1;i++){
        const a=out[out.length-1], b=pts[i], c=pts[i+1];
        const collinear = (a.x===b.x && b.x===c.x) || (a.y===b.y && b.y===c.y);
        if(!collinear) out.push(b);
      }
      out.push(pts[pts.length-1]);

      const out2=[];
      for(const p of out){
        if(!out2.length) out2.push(p);
        else{
          const q=out2[out2.length-1];
          if(q.x!==p.x || q.y!==p.y) out2.push(p);
        }
      }
      return out2;
    }

    const wires=[];
    for(let y=0;y<rows;y++){
      for(let x=0;x<cols;x++){
        const c=grid[y][x];
        if(!(c.kind==="wire"||c.kind==="junction")) continue;
        const k=key(x,y);
        if(visited.has(k)) continue;

        const stack=[[x,y]];
        const pts=[];
        while(stack.length){
          const [cx,cy]=stack.pop();
          const ck=key(cx,cy);
          if(visited.has(ck)) continue;
          visited.add(ck);
          pts.push(pointsOf(cx,cy));

          const nbs = neighbors(cx,cy);
          for(const nb of nbs) stack.push(nb);
        }

        const simp = simplify(pts);
        if(simp.length>=2){
          wires.push({id: uid("w"), points: simp});
        }
      }
    }
    return wires;
  }

  // ============================================================
  // =================== 值辨識（可用） ==========================
  // ============================================================
  function normalizeValueAndType(type, raw){
    const t = (raw||"").replace(/\s+/g,"").toLowerCase();

    let newType = type;
    if(t.includes("-j")) newType = "C";
    else if(t.includes("j")) newType = "L";

    let val = (raw||"").trim();
    val = val.replace(/ohm/gi,"Ω").replace(/omega/gi,"Ω");
    return {type:newType, value:val};
  }

  function cropAround(canvas, cx, cy, w, h){
    const c = document.createElement("canvas");
    c.width = w; c.height = h;
    const ctx = c.getContext("2d");
    const x = Math.max(0, Math.floor(cx - w/2));
    const y = Math.max(0, Math.floor(cy - h/2));
    ctx.drawImage(canvas, x, y, w, h, 0, 0, w, h);
    return c;
  }

  async function ocrWithTesseract(cropCanvas){
    const {data:{text}} = await Tesseract.recognize(cropCanvas, "eng", {
      tessedit_char_whitelist: "0123456789jJ-+∠°ΩVv.()HhKkMmUuNnPpFf",
    });
    return (text||"").replace(/\s+/g," ").trim().slice(0, 40);
  }

  async function recognizeValueForElement(el){
    const boxW = 180, boxH = 90;
    let cx = el.x, cy = el.y;

    if(el.type==="V"){ cx = el.x - 120; cy = el.y; }
    else if(el.type==="R"){ cx = el.x + 120; cy = el.y; }
    else if(el.type==="L" || el.type==="C"){ cx = el.x + 120; cy = el.y; }

    const crop = cropAround(srcC, cx, cy, boxW, boxH);

    const tfPred = await tfEnsemblePredict(crop, "value");

    let ocrText = "";
    if(!tfPred.text || tfPred.conf < 0.55){
      ocrText = await ocrWithTesseract(crop);
      ocrText = cleanPredictedValue(ocrText);
    }

    if(tfPred.text && tfPred.conf >= 0.7) return tfPred.text;
    if(ocrText) return ocrText;
    return tfPred.text || "";
  }

  // ============================================================
  // =================== JSON 組裝 ===============================
  // ============================================================
  function buildJson(cellSize, elements, wires){
    const count = {V:0,R:0,L:0,C:0,GND:0};
    for(const el of elements){
      if(el.type==="GND"){ el.name="GND"; continue; }
      count[el.type]=(count[el.type]||0)+1;
      el.name = el.type + count[el.type];
    }
    return {
      version: 2,
      grid: cellSize,
      freqHz: 60,
      elements,
      wires,
      junctions: []
    };
  }

  // ============================================================
  // =================== 視覺化 ===============================
  // ============================================================
  function drawPreview(json){
    clearCanvas(prevCtx, prevC);

    const cellSize = json.grid;
    prevCtx.strokeStyle="#e5e7eb"; prevCtx.lineWidth=1;
    for(let x=0;x<=prevC.width;x+=cellSize){ prevCtx.beginPath(); prevCtx.moveTo(x,0); prevCtx.lineTo(x,prevC.height); prevCtx.stroke(); }
    for(let y=0;y<=prevC.height;y+=cellSize){ prevCtx.beginPath(); prevCtx.moveTo(0,y); prevCtx.lineTo(prevC.width,y); prevCtx.stroke(); }

    prevCtx.strokeStyle="#2563eb"; prevCtx.lineWidth=3;
    for(const w of json.wires||[]){
      prevCtx.beginPath();
      prevCtx.moveTo(w.points[0].x, w.points[0].y);
      for(let i=1;i<w.points.length;i++) prevCtx.lineTo(w.points[i].x, w.points[i].y);
      prevCtx.stroke();
    }

    for(const el of json.elements||[]){
      drawSymbol(prevCtx, el);
    }
  }

  function drawSymbol(ctx, el){
    ctx.save();
    ctx.translate(el.x, el.y);
    ctx.rotate(((el.rotation||0) * Math.PI)/180);
    ctx.strokeStyle="#111827"; ctx.fillStyle="#111827"; ctx.lineWidth=3;
    ctx.font="14px Arial";

    if(el.type==="R"){
      if((el.rotation||0)%180===0){
        ctx.beginPath(); ctx.moveTo(-40,0); ctx.lineTo(-25,0);
        let x=-25, step=8, amp=10;
        for(let i=0;i<6;i++){ ctx.lineTo(x+step, i%2===0?amp:-amp); x+=step; }
        ctx.lineTo(25,0); ctx.lineTo(40,0); ctx.stroke();
      }else{
        ctx.beginPath(); ctx.moveTo(0,-40); ctx.lineTo(0,-25);
        let y=-25, step=8, amp=10;
        for(let i=0;i<6;i++){ ctx.lineTo(i%2===0?amp:-amp, y+step); y+=step; }
        ctx.lineTo(0,25); ctx.lineTo(0,40); ctx.stroke();
      }
    }else if(el.type==="L"){
      ctx.beginPath(); ctx.moveTo(0,-40); ctx.lineTo(0,-22); ctx.stroke();
      for(let i=0;i<4;i++){ ctx.beginPath(); ctx.arc(0, -14+i*10, 8, Math.PI/2, -Math.PI/2, true); ctx.stroke(); }
      ctx.beginPath(); ctx.moveTo(0,22); ctx.lineTo(0,40); ctx.stroke();
    }else if(el.type==="C"){
      if((el.rotation||0)%180===0){
        ctx.beginPath();
        ctx.moveTo(-40,0); ctx.lineTo(-12,0);
        ctx.moveTo(-8,-18); ctx.lineTo(-8,18);
        ctx.moveTo(8,-18); ctx.lineTo(8,18);
        ctx.moveTo(12,0); ctx.lineTo(40,0);
        ctx.stroke();
      }else{
        ctx.beginPath();
        ctx.moveTo(0,-40); ctx.lineTo(0,-12);
        ctx.moveTo(-18,-8); ctx.lineTo(18,-8);
        ctx.moveTo(-18,8); ctx.lineTo(18,8);
        ctx.moveTo(0,12); ctx.lineTo(0,40);
        ctx.stroke();
      }
    }else if(el.type==="V"){
      ctx.beginPath(); ctx.moveTo(0,-40); ctx.lineTo(0,-20); ctx.moveTo(0,20); ctx.lineTo(0,40); ctx.stroke();
      ctx.beginPath(); ctx.arc(0,0,20,0,Math.PI*2); ctx.stroke();
      ctx.fillText("+", 10, 4); ctx.fillText("-", -16, 4);
    }else if(el.type==="GND"){
      ctx.beginPath(); ctx.moveTo(0,-20); ctx.lineTo(0,0);
      ctx.moveTo(-16,0); ctx.lineTo(16,0);
      ctx.moveTo(-10,8); ctx.lineTo(10,8);
      ctx.moveTo(-5,16); ctx.lineTo(5,16);
      ctx.stroke();
    }

    ctx.rotate(-(((el.rotation||0) * Math.PI)/180));
    ctx.fillText(el.name||el.type, 14, -14);
    if(el.value){
      ctx.fillStyle="#374151";
      ctx.fillText(el.value, 14, 10);
    }
    ctx.restore();
  }

  // Debug：把 junction/wire/cluster 直接畫在 midC（合併視覺）
  function drawDebugMerged(allDebug){
    clearCanvas(midCtx, midC);
    if(img) fitDraw(img, midCtx, midC);
    if(!debug) return;

    // 畫每塊的 overlay
    for(const d of allDebug){
      const {gridPack, clusters, ox, oy} = d;
      const {rows, cols, cellSize, grid} = gridPack;

      // grid 線（淡）
      midCtx.globalAlpha = 0.22;
      midCtx.strokeStyle = "#e5e7eb";
      for(let x=0;x<=cols*cellSize;x+=cellSize){
        midCtx.beginPath(); midCtx.moveTo(ox+x, oy+0); midCtx.lineTo(ox+x, oy+rows*cellSize); midCtx.stroke();
      }
      for(let y=0;y<=rows*cellSize;y+=cellSize){
        midCtx.beginPath(); midCtx.moveTo(ox+0, oy+y); midCtx.lineTo(ox+cols*cellSize, oy+y); midCtx.stroke();
      }
      midCtx.globalAlpha = 1;

      // wire/junction 格
      for(let y=0;y<rows;y++){
        for(let x=0;x<cols;x++){
          const c=grid[y][x];
          if(c.kind==="wire"){
            midCtx.fillStyle="rgba(37,99,235,0.18)";
            midCtx.fillRect(ox+x*cellSize, oy+y*cellSize, cellSize, cellSize);
          }
          if(c.kind==="junction"){
            midCtx.fillStyle="rgba(16,185,129,0.28)";
            midCtx.fillRect(ox+x*cellSize, oy+y*cellSize, cellSize, cellSize);
          }
        }
      }

      // cluster bbox
      midCtx.strokeStyle="#ef4444";
      midCtx.lineWidth=2;
      for(const cl of clusters){
        midCtx.strokeRect(ox+cl.minX*cellSize, oy+cl.minY*cellSize, (cl.maxX-cl.minX+1)*cellSize, (cl.maxY-cl.minY+1)*cellSize);
      }
    }
  }

  // ============================================================
  // =================== 主流程（四分割） =========================
  // ============================================================
  async function run(){
    const cellSize = parseInt(cellEl.value, 10) || 20;
    if(!img) return;

    setStatus("切成四塊 + 分塊辨識…");
    await loadTfModelsIfAny();

    const tiles = splitCanvas4(srcC);

    let allElements = [];
    let allWires = [];
    const allDebug = [];

    for(let i=0;i<tiles.length;i++){
      const t = tiles[i];
      setStatus(`處理第 ${i+1}/4 塊…`);

      const gridPack = buildGridFromCanvas(t.canvas, cellSize);
      const clusters = detectSymbolClusters(gridPack);

      // 先只穩位置/方向：不做 type 模型，避免誤判
      const elements = [];
      for(const cl of clusters){
        const cls = guessSymbolType(cl);
        elements.push(clusterToElement(cl, cls, gridPack));
      }

      const wires = traceWires(gridPack);

      const ox = t.x, oy = t.y;
      allElements.push(...elements.map(e => offsetElement(e, ox, oy)));
      allWires.push(...wires.map(w => offsetWire(w, ox, oy)));

      allDebug.push({gridPack, clusters, ox, oy});
    }

    // 先組 JSON（位置/線）
    let json = buildJson(cellSize, allElements, allWires);

    // 值辨識（可先關掉：把這段整段註解即可）
    setStatus("辨識數值（OCR/多模型）…");
    for(const el of json.elements){
      if(el.type==="GND") continue;
      const raw = await recognizeValueForElement(el);
      const fixed = normalizeValueAndType(el.type, raw);
      el.type = fixed.type;
      el.value = fixed.value;
    }
    json = buildJson(cellSize, json.elements, json.wires);

    lastJson = json;
    outEl.value = JSON.stringify(json, null, 2);

    drawDebugMerged(allDebug);
    drawPreview(json);

    await copyJson(json);
    setStatus("完成：四塊合併 JSON 已自動複製（可下載）");
  }

  // ====== UI ======
  toggleDebugEl.onclick = () => {
    debug = !debug;
    setStatus(debug ? "Debug ON" : "Debug OFF");
    if(lastJson) drawPreview(lastJson);
  };
  dlEl.onclick = () => { if(!lastJson) return alert("尚無結果"); downloadJson(lastJson); };
  runEl.onclick = run;

  fileEl.onchange = async (e) => {
    const f = e.target.files?.[0];
    if(!f) return;
    img = new Image();
    img.onload = () => {
      fitDraw(img, srcCtx, srcC);
      fitDraw(img, midCtx, midC);
      clearCanvas(prevCtx, prevC);
      outEl.value = "";
      lastJson = null;
      runEl.disabled = false;
      setStatus("圖片已載入，按「開始辨識」");
    };
    img.onerror = () => setStatus("圖片載入失敗");
    img.src = URL.createObjectURL(f);
  };

  // init
  clearCanvas(srcCtx, srcC); clearCanvas(midCtx, midC); clearCanvas(prevCtx, prevC);
  outEl.value = JSON.stringify({version:2,grid:20,freqHz:60,elements:[],wires:[],junctions:[]}, null, 2);
  setStatus("就緒：上傳圖片開始（已啟用四分割 + Junction 抑制）");
})();
</script>
